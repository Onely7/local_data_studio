version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    versioning-strategy: "lockfile-only"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      python-dependencies:
        patterns:
          - "*"
    # Keep automated updates within the compatibility ranges enforced by this
    # project's direct requirements. Crossing these bounds requires coordinated
    # EDA or Pydantic migration work, not a standalone dependency update.
    ignore:
      - dependency-name: "pydantic"
        versions: [">=2.7.0"]
      - dependency-name: "pydantic-settings"
        versions: [">=2.3.0"]
      - dependency-name: "pandas"
        versions: [">=2.3.0"]
      - dependency-name: "scipy"
        versions: [">=1.13.0"]
      - dependency-name: "matplotlib"
        versions: [">=3.9.0"]
      - dependency-name: "embedding-atlas"
        versions: [">=0.22.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"

  # Dependabot discovers /.pre-commit-config.yaml from this root directory.
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "pre-commit"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      pre-commit-hooks:
        patterns:
          - "*"
