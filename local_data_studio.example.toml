# Manual translation uses only the values loaded in the current Preview page.
[translation]
max_batch_rows = 500
max_total_characters = 50000
max_strings = 2000
chunk_characters = 12000
max_concurrency = 2
confirm_rows = 25
confirm_characters = 10000
