# Copy this file to local_data_studio.toml, then update the paths for your machine.
# Keep credentials in the .env file named by env_file, not in this file.

[paths]
# Relative paths are resolved from workspace_dir. The default "." means the
# directory that contains this configuration file.
workspace_dir = "."
env_file = ".env"
data_dir = "data"
cache_dir = "cache"
models_dir = "models/embedder"
file_serve_roots = []
vis_exclude_dirs = []
vis_exclude_files = []

[server]
host = "127.0.0.1"
port = 8000
reload = false

# SQL generation is optional. Add, remove, or edit profiles below to match the
# providers you use. api_key_env names a variable in your shell or .env file.
[llm]
default_model = "openai-main"
timeout_seconds = 60

[[llm.models]]
id = "openai-main"
label = "OpenAI"
model = "openai/gpt-5.2"
api_key_env = "OPENAI_API_KEY"
provider_options = { max_completion_tokens = 400 }

