# Copy this file to local_data_studio.toml, then update the paths for your machine.
# Keep credentials in the .env file named by env_file, not in this file.

[paths]
# Relative paths are resolved from workspace_dir. The default "." means the
# directory that contains this configuration file.
workspace_dir = "."
env_file = ".env"
data_dir = "data"
cache_dir = "cache"
models_dir = "models/embedder"
file_serve_roots = []
vis_exclude_dirs = []
vis_exclude_files = []

[server]
host = "127.0.0.1"
port = 8000
reload = false

# These values replace the matching environment variables in .env. The TOML
# key uses lowercase snake_case: EDA_ROW_LIMIT becomes eda_row_limit, for
# example. Omit a key to use the value from .env or the application default.
[settings]
allow_delete_data = false

eda_row_limit = 100000
eda_cell_max_chars = 4096
eda_nested_policy = "stringify"
eda_cache_max_bytes = 1073741824

atlas_host = "127.0.0.1"
atlas_port = 5055
atlas_max_instances = 4
atlas_sample = 0
atlas_batch_size = 0
atlas_cache_max_bytes = 10737418240
atlas_text_max_chars = 4096
atlas_embedding_dtype = "float32"
atlas_umap_projection_mode = "full"
atlas_umap_anchor_sample = 10000
atlas_trust_remote_code = false

# LLM features are optional. Add, remove, or edit profiles below to match the
# providers you use. api_key_env names a variable in your shell or .env file.
[llm]
default_sql_generation_model = "openai-main"
default_translation_model = "openai-main"
timeout_seconds = 60

[[llm.models]]
id = "openai-main"
label = "OpenAI"
model = [
  "openai/gpt-5.6-luna",
  "openai/gpt-5.5",
  "openai/gpt-5.4",
  "openai/gpt-5.4-mini-2026-03-17",
  "openai/gpt-5.4-nano-2026-03-17",
]
api_key_env = "OPENAI_API_KEY"
sql_generation = true
translation = true
provider_options = { max_completion_tokens = 400 }

